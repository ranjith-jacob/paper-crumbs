{% extends "base.html" %}

{% block content %}
<h1>Book List</h1>
<ul>
    {% for book in book_list %}
        <li>
            <a href="{% url 'book-detail' book.id %}">
                {{book.name}} by {{book.author}} | {{book.series}} | {{book.published_year}}
            </a>
        </li>
    {% endfor %}
</ul>
{% endblock content %}
